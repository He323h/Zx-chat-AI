<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>English Tutor - AI Powered</title>
    <meta name="description" content="English Tutor - AI Powered — Your AI English tutor" />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="English Tutor - AI Powered" />
    <meta property="og:description" content="English Tutor - AI Powered — Your AI English tutor" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="English Tutor - AI Powered" />
    <meta name="twitter:description" content="English Tutor - AI Powered — Your AI English tutor" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <!-- Matches manifest.json theme_color — TWA uses this for the status bar -->
    <meta name="theme-color" content="#1CB0F6" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="English Tutor - AI Powered" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- ─── Splash screen styles — inline so they paint before any JS loads ─── -->
    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        /* Exactly matches the React SplashScreen gradient */
        background: linear-gradient(135deg, #1CB0F6 0%, #0E8FD4 100%);
        transition: opacity 0.3s ease;
      }

      #splash.splash-hide {
        opacity: 0;
        pointer-events: none;
      }

      #splash img {
        width: 38vw;
        max-width: 200px;
        min-width: 120px;
        filter: drop-shadow(0 8px 24px rgba(0,0,0,0.18));
      }
    </style>
  </head>
  <body>
    <!-- ─── Splash — visible instantly, removed after React mounts ─── -->
    <div id="splash" aria-hidden="true">
      <img src="/owl-logo.png" alt="English Tutor - AI Powered" />
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
